[loggers]
keys=root,updateCbeLogger,updateNbbLogger,mailLogger

[handlers]
keys=consoleHandler,updateCbeHandler,updateNbbHandler,mailHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler

[logger_updateCbeLogger]
level=DEBUG
handlers=updateCbeHandler
qualname=updateCbeLogger
propagate=1

[logger_updateNbbLogger]
level=DEBUG
handlers=updateNbbHandler
qualname=updateNbbLogger
propagate=1

[logger_mailLogger]
level=DEBUG
handlers=mailHandler
qualname=mailLogger
propagate=1

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=simpleFormatter
args=(sys.stdout,)

[handler_updateCbeHandler]
class=FileHandler
level=INFO
formatter=simpleFormatter
args=('db_automation/logger/logs/update_cbe.log', 'w')

[handler_updateNbbHandler]
class=FileHandler
level=INFO
formatter=simpleFormatter
args=('db_automation/logger/logs/update_nbb.log', 'w')

[handler_mailHandler]
class=FileHandler
level=WARNING
formatter=simpleFormatter
args=('db_automation/logger/logs/mail.log', 'w')

[formatter_simpleFormatter]
format=%(asctime)s [%(levelname)s] %(message)s